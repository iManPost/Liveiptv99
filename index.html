    <script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #player {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16/9;
        }
        #channel-list {
            margin: 10px auto;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }
        .channel {
            cursor: pointer;
            padding: 5px;
            background: #222;
            border: 1px solid #444;
            border-radius: 5px;
            text-align: center;
            width: 60px;
        }
        .channel img {
            width: 50px;
            height: 50px;
            margin-bottom: 5px;
        }
        .channel:hover {
            background: #000;
        }
        #startPlayback {
            margin: 15px;
            padding: 10px 20px;
            background: orange;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2 style="color:orange; text-align:center;">TV + HLS</h2>

            },
			{

			{
                name: "test",

                file: "http://54.37.19.157/history/tracks-v1a1/mono.m3u8",
                drm: false
            }, 
			
            // … คุณสามารถเพิ่มช่องอื่นๆ ได้ตามต้องการ
        ];

        function loadPlayer(channel) {
            const config = {
                file: channel.file,
                width: "100%",
                aspectratio: "16:9",
                autostart: true,
                mute: false
            };

            // ถ้าเป็นไฟล์ .mpd + drm
            if (channel.drm) {
                config.type = "dash";
                config.drm = {
                    clearkey: {
                        keyId: channel.keyId,
                        key: channel.key
                    }
                };
            } else {
                // ถ้าไฟล์ .m3u8 (HLS)
                config.type = "hls";
            }

            jwplayer("player").setup(config);
        }

        const channelList = document.getElementById("channel-list");
        channels.forEach((channel, idx) => {
            const div = document.createElement("div");
            div.className = "channel";
            const logoHtml = channel.logo 
                ? `<img src="${channel.logo}" alt="${channel.name}"><br>`
                : "";
            div.innerHTML = logoHtml + channel.name;
            div.onclick = () => loadPlayer(channel);
            channelList.appendChild(div);
        });

        document.getElementById("startPlayback").onclick = () => {
            loadPlayer(channels[0]); // เล่นช่องแรกเป็น default
            document.getElementById("startPlayback").style.display = "none";
        };
    </script>
</body>
</html>
