html<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Video Player Template</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        /* จัดกลุ่มตัวเล่นวิดีโอให้อยู่กึ่งกลาง */
        .video-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .mock-video {
            width: 100%;
            max-width: 800px;
            height: 450px;
            background-color: #000;
            border: 3px solid #00f0ff; /* ขอบไฟนีออนสีฟ้า */
            box-shadow: 0 0 15px #00f0ff;
            border-radius: 8px;
        }
        /* จัดกลุ่มโลโก้ช่องให้อยู่กึ่งกลางและเว้นระยะห่าง */
        .channel-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .channel-list a img {
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .channel-list a img:hover {
            transform: scale(1.1); /* ขยายขนาดเล็กน้อยเมื่อเอาเมาส์วาง */
        }
    </style>
</head>
<body>

    <!-- ส่วนของตัวเล่นวิดีโอจำลอง จัดกึ่งกลาง -->
    <div class="video-container">
        <video class="mock-video" controls poster="https://shutterstock.com">
            <!-- ใส่ Tag video หลอกไว้โดยไม่มีไฟล์เล่นจริง -->

    </div>
